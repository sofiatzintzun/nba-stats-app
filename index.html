<!DOCTYPE html>
<html>
<head>
  <title>NBA Stats Oficial</title>
</head>
<body>

<h2>Buscar jugador NBA</h2>

<input type="text" id="playerName" placeholder="Ej: LeBron James">
<button onclick="buscarJugador()">Buscar</button>

<table border="1">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>PTS</th>
      <th>REB</th>
      <th>AST</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script>

async function buscarJugador() {
  const nombre = document.getElementById("playerName").value;

  // 🔥 1. buscar jugador ID
  const res = await fetch(`https://stats.nba.com/stats/commonallplayers?LeagueID=00&Season=2024-25`, {
    headers: {
      "User-Agent": "Mozilla/5.0",
      "Referer": "https://www.nba.com/",
      "Accept": "application/json"
    }
  });

  const data = await res.json();
  const players = data.resultSets[0].rowSet;

  const player = players.find(p => p[2].toLowerCase().includes(nombre.toLowerCase()));

  if (!player) {
    alert("Jugador no encontrado");
    return;
  }

  const playerId = player[0];

  // 🔥 2. obtener últimos juegos
  const resStats = await fetch(`https://stats.nba.com/stats/playergamelog?PlayerID=${playerId}&Season=2024-25`, {
    headers: {
      "User-Agent": "Mozilla/5.0",
      "Referer": "https://www.nba.com/",
      "Accept": "application/json"
    }
  });

  const statsData = await resStats.json();
  const games = statsData.resultSets[0].rowSet;

  const ultimos5 = games.slice(0, 5);

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  ultimos5.forEach(game => {
    const row = `
      <tr>
        <td>${game[3]}</td> <!-- fecha -->
        <td>${game[24]}</td> <!-- pts -->
        <td>${game[18]}</td> <!-- reb -->
        <td>${game[19]}</td> <!-- ast -->
      </tr>
    `;
    tabla.innerHTML += row;
  });
}

</script>

</body>
</html>
