<script>

const API_KEY = "f98f094e27msh7da89bc57ead6bcp1a3a25jsn860890ab2ae";

async function buscarJugador() {
  const nombre = document.getElementById("playerName").value;

  const resPlayer = await fetch(`https://api-nba-v1.p.rapidapi.com/players?search=${nombre}`, {
    method: "GET",
    headers: {
      "x-rapidapi-key": API_KEY,
      "x-rapidapi-host": "api-nba-v1.p.rapidapi.com"
    }
  });

  const dataPlayer = await resPlayer.json();

  if (!dataPlayer.response.length) {
    alert("Jugador no encontrado");
    return;
  }

  const playerId = dataPlayer.response[0].id;

  const resStats = await fetch(`https://api-nba-v1.p.rapidapi.com/players/statistics?id=${playerId}&season=2024`, {
    method: "GET",
    headers: {
      "x-rapidapi-key": API_KEY,
      "x-rapidapi-host": "api-nba-v1.p.rapidapi.com"
    }
  });

  const dataStats = await resStats.json();

  const games = dataStats.response;

  games.sort((a, b) => new Date(b.game.date.start) - new Date(a.game.date.start));

  const ultimos5 = games.slice(0, 5);

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  ultimos5.forEach(game => {
    const row = `
      <tr>
        <td>${game.game.date.start}</td>
        <td>${game.points}</td>
        <td>${game.totReb}</td>
        <td>${game.assists}</td>
      </tr>
    `;
    tabla.innerHTML += row;
  });
}

</script>
