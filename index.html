<!DOCTYPE html>
<html>
<head>
  <title>NBA Stats Oficial</title>
</head>
<body>

<h2>Buscar jugador NBA</h2>

<input type="text" id="playerName" placeholder="Ej: LeBron James">
<button onclick="buscarJugador()">Buscar</button>

<table border="1">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>PTS</th>
      <th>REB</th>
      <th>AST</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script>

async function buscarJugador() {
  const nombre = document.getElementById("playerName").value;

  const res = await fetch("https://script.google.com/macros/s/AKfycbwOBvtxJrlZL-XAQEU_aU6YYxCGQH1wum3CEPga5DwWQWnwHB7XSKrwY25xVzANK-dvVQ/exec?name=" + nombre);
  
  const data = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(game => {
    const row = `
      <tr>
        <td>${game.fecha}</td>
        <td>${game.pts}</td>
        <td>${game.reb}</td>
        <td>${game.ast}</td>
      </tr>
    `;
    tabla.innerHTML += row;
  });
}

</script>

</body>
</html>
